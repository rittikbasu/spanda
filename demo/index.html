<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#f1efe8">
    <meta name="description" content="listen to spanda's procedural interface sounds.">
    <title>spanda · procedural interface sounds</title>
    <link rel="stylesheet" href="./demo/styles.css">
  </head>
  <body>
    <div class="shell">
      <main class="stage">
        <section class="identity" aria-labelledby="page-title">
          <div class="identity__lockup">
            <h1 id="page-title">spanda</h1>
            <span class="identity__script" lang="sa">स्पन्द</span>
          </div>
          <p class="identity__copy">sounds for interfaces you can almost feel.</p>

          <div class="resonance-block">
            <div class="resonance" id="resonance" data-voice="tactile" aria-hidden="true">
              <span class="resonance__axis resonance__axis--x"></span>
              <span class="resonance__axis resonance__axis--y"></span>
              <span class="resonance__core"></span>
              <span class="resonance__pulse resonance__pulse--1"></span>
              <span class="resonance__pulse resonance__pulse--2"></span>
              <span class="resonance__pulse resonance__pulse--3"></span>
            </div>

            <div class="readout" id="readout" role="status" aria-live="polite">
              <div class="readout__line">
                <span class="readout__signal" aria-hidden="true"></span>
                <strong class="readout__cue" id="status-cue">ready</strong>
              </div>
              <span class="readout__meta" id="status-meta">tactile voice</span>
            </div>
          </div>

          <fieldset class="profile-set">
            <legend>voice profile</legend>
            <div class="profiles" id="profiles"></div>
          </fieldset>
        </section>

        <section class="audition" aria-labelledby="cue-heading">
          <div class="section-head">
            <h2 id="cue-heading">listen</h2>
            <span class="section-head__hint">choose a voice, tap a cue</span>
          </div>
          <div class="cues" id="cues"></div>

          <div class="install">
            <span class="install__label">install</span>
            <div class="install__command">
              <code>npm install spanda</code>
              <button class="install__copy" id="copy-install" type="button" aria-label="copy install command">
                <span id="copy-state" aria-hidden="true">copy</span>
              </button>
              <span class="visually-hidden" id="copy-announcement" role="status" aria-live="polite"></span>
            </div>
          </div>

          <footer class="page-foot">
            <span>~4.2 kB min+gzip · 0 audio files · 0 deps</span>
            <nav class="page-foot__links" aria-label="project links">
              <a href="https://github.com/rittikbasu/spanda">github ↗</a>
            </nav>
          </footer>
        </section>
      </main>
    </div>

    <script type="module" src="./demo/main.js"></script>
  </body>
</html>
